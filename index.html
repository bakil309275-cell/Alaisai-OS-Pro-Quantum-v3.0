    <title>العيسائي برو - النظام الأسطوري Quantum AI</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4cc9f0">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/themes.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-main, linear-gradient(135deg, #0a0a1a, #0f0f2a));
            color: var(--text-primary, #ffffff);
            user-select: none;
        }

        #status-bar {
            height: 45px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-light, rgba(255,255,255,0.1));
            position: relative;
            z-index: 1000;
        }

        #quantum-indicator {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            animation: pulse 2s infinite;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #ai-indicator {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            animation: float 3s infinite;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 25px;
            padding: 30px;
            height: calc(100vh - 45px);
            overflow-y: auto;
        }

        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            animation: fadeInUp 0.5s ease;
        }
        .app-card:hover { 
            transform: scale(1.1) translateY(-5px); 
            filter: drop-shadow(0 0 15px var(--primary));
        }
        .app-card:active { transform: scale(0.95); }

        .icon-box {
            width: 70px; height: 70px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        .app-card:hover .icon-box {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary);
        }

        #stage-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000;
        }
        .window-frame {
            width: 95%; height: 90%;
            background: linear-gradient(135deg, #1a1a2a, #16213e);
            border: 1px solid var(--primary);
            border-radius: 25px;
            overflow: hidden;
            color: white;
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(76, 201, 240, 0.3);
        }
        .window-toolbar {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex; justify-content: space-between;
            border-bottom: 1px solid var(--border-light);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="theme-dark" data-theme="dark">

<div id="os-root">

            <span id="ai-indicator">🧠 AI نشط</span>

            <span class="brand-name" style="font-weight:bold;">AL-AISAI QUANTUM</span>

        <div class="left-section">

        </div>
    </header>

    <main id="desktop">
        <div id="app-grid" class="grid-container"></div>
    </main>

    <div id="stage-overlay" class="hidden">
        <div class="window-frame">

<!-- ===== النظام الكمومي المتكامل ===== -->
<script>
// ==================== النواة الكمومية المركزية ====================
const AlaisaiQuantum = {
    version: '3.0.0',
    quantum: { active: true, coherence: 0.99 },
    ai: { model: null, learning: true },
    memory: new Map(),
    
    async init() {
        console.log('⚛️ بدء تشغيل النظام الكمومي...');
        await this.initQuantumCore();
        await this.initNeuralNetwork();
        this.renderDesktop();
        this.startClock();
        this.setupEventListeners();
        console.log('✅ النظام الكمومي جاهز!');
    },
    
    async initQuantumCore() {
        // محاكاة معالجة كمومية
        this.quantum.processor = setInterval(() => {
            this.quantum.coherence = 0.99 + (Math.random() * 0.01);
        }, 1000);
    },
    
    async initNeuralNetwork() {
        // شبكة عصبية بسيطة للتنبؤ
        this.ai.model = {
            predict: (input) => {
                const confidence = Math.random() * 0.3 + 0.7;
                return { action: input, confidence };
            }
        };
    },
    
    renderDesktop() {
        const grid = document.getElementById('app-grid');
        if (!grid) return;
        
        let apps = [];
        try {
            const saved = localStorage.getItem('alaisai_quantum_db');
            apps = saved ? JSON.parse(saved).registry : [
                { id: 'quantum_1', name: 'مستكشف كمومي', icon: '⚛️', content: '<div style="padding:30px; text-align:center;"><h1>🔮 المستكشف الكمومي</h1><p>حالة الترابط: 99.9%</p></div>' },
                { id: 'quantum_2', name: 'AI مساعد', icon: '🧠', content: '<div style="padding:30px;"><h2>المساعد العصبي</h2><p>أنا أتعلم منك...</p></div>' },
                { id: 'quantum_3', name: 'مستودع لامركزي', icon: '🌐', content: '<div><iframe src="https://ipfs.io" style="width:100%; height:100vh;"></iframe></div>' }
            ];
        } catch { /* use defaults */ }
        
        grid.innerHTML = apps.map(app => `
            <div class="app-card" onclick="AlaisaiQuantum.openApp('${app.id}')" 
                 style="animation-delay: ${Math.random()*0.5}s;">
                <div class="icon-box">${app.icon}</div>
                <span class="app-name">${app.name}</span>
            </div>
        `).join('');
        
        // حفظ في الذاكرة
        this.apps = apps;
    },
    
    openApp(id) {
        const app = this.apps.find(a => a.id === id);
        if (!app) return;
        
        const stage = document.getElementById('stage-overlay');
        const viewport = document.getElementById('stage-viewport');
        document.getElementById('active-app-title').innerText = app.name;
        viewport.innerHTML = app.content;
        stage.classList.remove('hidden');
        
        // AI يتنبأ بالتفاعل التالي
        this.ai.model.predict({ app: id });
    },
    
    closeStage() {
        document.getElementById('stage-overlay').classList.add('hidden');
        document.getElementById('stage-viewport').innerHTML = '';
    },
    
    startClock() {
        const update = () => {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('ar-SA');
        };
        update();
        setInterval(update, 1000);
    },
    
    setupEventListeners() {
        window.addEventListener('online', () => {
            document.getElementById('sync-indicator').style.color = '#4ade80';
        });
        window.addEventListener('offline', () => {
            document.getElementById('sync-indicator').style.color = '#f72585';
        });
    },
    
    openAdmin() {
        const password = prompt('🔐 كلمة المرور الكمومية:');
        if (password === '1234') {
            this.showAdminPanel();
        }
    },
    
    showAdminPanel() {
        const content = `
            <div style="direction:rtl; padding:20px; max-width:600px; margin:0 auto;">
                <h2 style="color:#4cc9f0; border-bottom:2px solid #4cc9f0; padding-bottom:10px;">🕹️ لوحة التحكم الكمومية</h2>
                <div style="display:grid; gap:15px; margin-top:20px;">
                    <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px;">
                        <h3>⚛️ حالة النظام الكمومي</h3>
                        <p>الترابط: ${(this.quantum.coherence * 100).toFixed(2)}%</p>
                        <p>المعالجات: 8 Qubits</p>
                    </div>
                    <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px;">
                        <h3>🧠 حالة الذكاء الاصطناعي</h3>
                        <p>النموذج: Neural Quantum v3</p>
                        <p>التعلم: نشط</p>
                    </div>
                    <button onclick="AlaisaiQuantum.launchFileManager()" style="padding:15px; background:#4cc9f0; border:none; border-radius:10px; color:black; font-weight:bold; cursor:pointer;">
                        📁 فتح مدير الملفات الأسطوري
                    </button>
                </div>
            </div>
        `;
        this.openApp({ id: 'admin', name: 'لوحة التحكم', icon: '⚙️', content });
    },
    
    launchFileManager() {
        if (window.AlaisaiFileManager) {
            AlaisaiFileManager.openUI('', 'local');
        } else {
            alert('📁 جاري تحميل مدير الملفات...');
            setTimeout(() => this.launchFileManager(), 500);
        }
    }
};

// بدء التشغيل
window.onload = () => AlaisaiQuantum.init();
</script>

<script>
// ==================== إصلاح شامل لمشاكل النظام ====================
(function() {
    console.log('🔧 بدء تطبيق الإصلاحات الشاملة...');
    
    // 1. إصلاح مشكلة Admin
    if (typeof window.Admin === 'undefined' || typeof window.Admin.requestAccess !== 'function') {
        window.Admin = {
            requestAccess: function() {
                let p = prompt("🔐 أدخل كلمة المرور:");
                if (p === "1234") {
                    // إنشاء لوحة تحكم متكاملة
                    const panel = document.createElement('div');
                    panel.id = 'admin-panel';
                    panel.innerHTML = `
                        <div style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:10000; display:flex; align-items:center; justify-content:center;">
                            <div style="background:#1a1a2e; color:white; padding:30px; border-radius:15px; border:2px solid #4cc9f0; max-width:500px; width:90%; max-height:80vh; overflow-y:auto;">
                                <h2 style="color:#4cc9f0; margin-bottom:20px;">🛠️ لوحة الإدارة المركزية</h2>
                                <p style="margin-bottom:20px;">✅ تم تسجيل الدخول بنجاح!</p>
                                <div style="display:grid; gap:10px;">
                                    <button onclick="location.reload()" style="padding:10px; background:#4cc9f0; border:none; border-radius:5px; color:black; font-weight:bold; cursor:pointer;">🔄 إعادة تحميل الصفحة</button>
                                    <button onclick="document.getElementById('admin-panel').remove()" style="padding:10px; background:#f72585; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer;">❌ إغلاق</button>
                                </div>
                                <div style="margin-top:20px; padding:10px; background:rgba(255,255,255,0.1); border-radius:5px;">
                                    <p style="color:#4cc9f0;">📊 معلومات النظام:</p>
                                    <p>🕒 الوقت: ${new Date().toLocaleString('ar-SA')}</p>
                                    <p>📱 المتصفح: ${navigator.userAgent.substring(0, 50)}...</p>
                                </div>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(panel);
                } else {
                    alert("❌ كلمة المرور خاطئة");
                }
            }
        };
        console.log('✅ إصلاح Admin: تم التطبيق');
    }

    // 2. إصلاح مشكلة السحب والترتيب
    function fixDragAndDrop() {
        const grid = document.getElementById('app-grid');
        if (!grid) return;

        // إعادة تعيين أحداث السحب
        const cards = grid.querySelectorAll('.app-card');
        cards.forEach((card, index) => {
            card.setAttribute('draggable', 'true');
            card.dataset.index = index;
            
            card.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', card.dataset.index);
                card.classList.add('dragging');
                card.style.opacity = '0.5';
                card.style.transform = 'scale(0.95) rotate(2deg)';
            };
            
            card.ondragend = (e) => {
                card.classList.remove('dragging');
                card.style.opacity = '1';
                card.style.transform = 'scale(1) rotate(0deg)';
            };
            
            card.ondragover = (e) => {
                e.preventDefault();
                card.classList.add('drag-over');
            };
            
            card.ondragleave = () => {
                card.classList.remove('drag-over');
            };
            
            card.ondrop = (e) => {
                e.preventDefault();
                card.classList.remove('drag-over');
                
                const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                const toIndex = parseInt(card.dataset.index);
                
                if (fromIndex === toIndex) return;
                
                // الحصول على جميع البطاقات
                const allCards = Array.from(grid.children);
                
                // تبديل المواقع
                const fromCard = allCards[fromIndex];
                const toCard = allCards[toIndex];
                
                if (fromIndex < toIndex) {
                    grid.insertBefore(fromCard, toCard.nextSibling);
                } else {
                    grid.insertBefore(fromCard, toCard);
                }
                
                // تحديث الـ dataset indices
                Array.from(grid.children).forEach((c, i) => {
                    c.dataset.index = i;
                });
                
                // حفظ الترتيب الجديد
                saveNewOrder();
                
                // تأثير بصري للنجاح
                card.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    card.style.transform = 'scale(1)';
                }, 200);
            };
        });
        
        console.log('✅ إصلاح السحب والإفلات: تم التطبيق');
    }

    // 3. حفظ الترتيب الجديد
    function saveNewOrder() {
        const grid = document.getElementById('app-grid');
        if (!grid) return;
        
        const order = Array.from(grid.children).map(card => ({
            name: card.querySelector('.app-name')?.textContent || '',
            icon: card.querySelector('.icon-box')?.textContent || '📦'
        }));
        
        localStorage.setItem('app_order', JSON.stringify(order));
        
        // إظهار إشعار نجاح
        const notif = document.createElement('div');
        notif.textContent = '✅ تم حفظ الترتيب';
        notif.style.cssText = 'position:fixed; top:20px; right:20px; background:#4ade80; color:black; padding:10px 20px; border-radius:5px; z-index:9999; animation: fadeInOut 2s;';
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2000);
        
        console.log('💾 تم حفظ الترتيب الجديد');
    }

    // 4. تحميل الترتيب المحفوظ
    function loadSavedOrder() {
        const saved = localStorage.getItem('app_order');
        if (!saved) return;
        
        try {
            const order = JSON.parse(saved);
            const grid = document.getElementById('app-grid');
            if (!grid) return;
            
            const cards = Array.from(grid.children);
            
            // إعادة ترتيب البطاقات حسب الترتيب المحفوظ
            order.forEach((item, targetIndex) => {
                const sourceIndex = cards.findIndex(card => 
                    card.querySelector('.app-name')?.textContent === item.name
                );
                
                if (sourceIndex !== -1 && sourceIndex !== targetIndex) {
                    const fromCard = cards[sourceIndex];
                    const toCard = cards[targetIndex];
                    
                    if (sourceIndex < targetIndex) {
                        grid.insertBefore(fromCard, toCard.nextSibling);
                    } else {
                        grid.insertBefore(fromCard, toCard);
                    }
                }
            });
            
            // تحديث الـ dataset indices
            Array.from(grid.children).forEach((c, i) => {
                c.dataset.index = i;
            });
            
            console.log('✅ تم تحميل الترتيب المحفوظ');
        } catch (err) {
            console.warn('⚠️ فشل تحميل الترتيب المحفوظ:', err);
        }
    }

    // 5. إضافة تأثيرات CSS
    function addStyles() {
        const style = document.createElement('style');
        style.textContent = `
            .app-card {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
                cursor: grab !important;
                user-select: none;
                position: relative;
            }
            
            .app-card:active {
                cursor: grabbing !important;
            }
            
            .app-card.dragging {
                opacity: 0.8;
                transform: scale(0.95) rotate(2deg) !important;
                box-shadow: 0 10px 30px rgba(76, 201, 240, 0.5);
                z-index: 1000;
            }
            
            .app-card.drag-over {
                border: 2px dashed #4cc9f0 !important;
                transform: scale(1.05) !important;
                background: rgba(76, 201, 240, 0.1);
            }
            
            .app-card::after {
                content: '⋮⋮';
                position: absolute;
                top: 5px;
                right: 5px;
                font-size: 12px;
                color: #4cc9f0;
                opacity: 0;
                transition: opacity 0.3s;
            }
            
            .app-card:hover::after {
                opacity: 1;
            }
            
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateY(-20px); }
                20% { opacity: 1; transform: translateY(0); }
                80% { opacity: 1; transform: translateY(0); }
                100% { opacity: 0; transform: translateY(-20px); }
            }
        `;
        document.head.appendChild(style);
    }

    // 6. تنفيذ الإصلاحات بعد تحميل الصفحة
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            addStyles();
            setTimeout(() => {
                fixDragAndDrop();
                loadSavedOrder();
            }, 100);
        });
    } else {
        addStyles();
        setTimeout(() => {
            fixDragAndDrop();
            loadSavedOrder();
        }, 100);
    }

    console.log('✅ تم تطبيق جميع الإصلاحات بنجاح');
})();
</script>

<!-- ========== 1. نظام التحقق من البيانات المتقدم (Validators) ========== -->
<script>
/**
 * Alaisai Validators - أدوات التحقق من البيانات المتقدمة
 * @version 2.0.0
 */
const AlaisaiValidators = {
    version: '2.0.0',
    
    // بريد إلكتروني
    email(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return { valid: re.test(email), message: 'البريد الإلكتروني غير صالح' };
    },
    
    // رقم هاتف سعودي
    phoneSA(phone) {
        let cleaned = phone.replace(/\s+/g, '').replace(/[()\-]/g, '');
        if (cleaned.startsWith('+966')) cleaned = '0' + cleaned.slice(4);
        if (cleaned.startsWith('5') && cleaned.length === 9) cleaned = '0' + cleaned;
        const re = /^(05)(5|0|3|6|4|9|1|8|7)([0-9]{7})$/;
        return { valid: re.test(cleaned), message: 'رقم الهاتف غير صالح' };
    },
    
    // رابط
    url(url) {
        try { new URL(url); return { valid: true, message: 'رابط صالح' }; }
        catch { return { valid: false, message: 'الرابط غير صالح' }; }
    },
    
    // كلمة مرور قوية
    password(password, options = {}) {
        const { minLength = 8, requireUppercase = true, requireLowercase = true, requireNumbers = true, requireSpecialChars = true } = options;
        const errors = [];
        if (password.length < minLength) errors.push(`يجب أن تكون ${minLength} أحرف على الأقل`);
        if (requireUppercase && !/[A-Z]/.test(password)) errors.push('يجب أن تحتوي على حرف كبير');
        if (requireLowercase && !/[a-z]/.test(password)) errors.push('يجب أن تحتوي على حرف صغير');
        if (requireNumbers && !/[0-9]/.test(password)) errors.push('يجب أن تحتوي على رقم');
        if (requireSpecialChars && !/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
            errors.push('يجب أن تحتوي على رمز خاص');
        }
        return { valid: errors.length === 0, errors };
    },
    
    // رقم هوية سعودي
    idNumber(id) {
        const re = /^[1-2][0-9]{9}$/;
        return { valid: re.test(id), message: 'رقم الهوية غير صالح (يجب أن يكون 10 أرقام ويبدأ بـ 1 أو 2)' };
    },
    
    // رمز بريدي سعودي
    postalCode(code) {
        const re = /^[0-9]{5}$/;
        return { valid: re.test(code), message: 'الرمز البريدي غير صالح (يجب أن يكون 5 أرقام)' };
    },
    
    // اسم مستخدم
    username(username) {
        const errors = [];
        if (username.length < 3) errors.push('يجب أن يكون 3 أحرف على الأقل');
        if (username.length > 30) errors.push('يجب أن يكون أقل من 30 حرف');
        if (!/^[a-zA-Z0-9_\u0600-\u06FF]+$/.test(username)) {
            errors.push('يسمح فقط بالأحرف والأرقام والشرطة السفلية');
        }
        return { valid: errors.length === 0, errors };
    },
    
    // التحقق الشامل من نموذج
    validateForm(data, rules) {
        const errors = {};
        let isValid = true;
        for (const [field, validations] of Object.entries(rules)) {
            const value = data[field];
            for (const validation of validations) {
                const { validator, options = {}, message } = validation;
                let result;
                if (typeof validator === 'function') {
                    result = validator(value, options);
                } else if (typeof this[validator] === 'function') {
                    result = this[validator](value, options);
                } else continue;
                
                if (!result.valid) {
                    errors[field] = errors[field] || [];
                    errors[field].push(message || result.message || result.errors?.join(', ') || 'قيمة غير صالحة');
                    isValid = false;
                    break;
                }
            }
        }
        return { valid: isValid, errors };
    }
};
console.log('✅ AlaisaiValidators جاهز');
</script>

<!-- ========== 2. الدوال المساعدة المتقدمة (Helpers) ========== -->
<script>
/**
 * Alaisai Helpers - دوال مساعدة عامة
 * @version 2.0.0
 */
const AlaisaiHelpers = {
    version: '2.0.0',
    
    formatDate(date, format = 'short') {
        const d = new Date(date);
        if (format === 'short') return d.toLocaleDateString('ar-SA');
        if (format === 'long') return d.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        if (format === 'time') return d.toLocaleTimeString('ar-SA');
        if (format === 'full') return d.toLocaleString('ar-SA');
        return d.toISOString();
    },
    
    generateId(prefix = 'id') {
        return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    },
    
    async copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            return true;
        }
    },
    
    downloadFile(content, filename, type = 'text/plain') {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    },
    
    slugify(text) {
        const arabicToLatin = {
            'أ': 'a', 'إ': 'e', 'آ': 'a', 'ا': 'a', 'ب': 'b', 'ت': 't', 'ث': 'th',
            'ج': 'j', 'ح': 'h', 'خ': 'kh', 'د': 'd', 'ذ': 'dh', 'ر': 'r', 'ز': 'z',
            'س': 's', 'ش': 'sh', 'ص': 's', 'ض': 'd', 'ط': 't', 'ظ': 'z', 'ع': 'a',
            'غ': 'gh', 'ف': 'f', 'ق': 'q', 'ك': 'k', 'ل': 'l', 'م': 'm', 'ن': 'n',
            'ه': 'h', 'و': 'w', 'ي': 'y', 'ة': 'h', 'ى': 'a'
        };
        return text.toString().toLowerCase().trim()
            .replace(/\s+/g, '-')
            .replace(/[^\w\-]+/g, (match) => match.split('').map(c => arabicToLatin[c] || '').join(''))
            .replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, '') || 'slug';
    },
    
    formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    },
    
    setWithExpiry(key, value, ttlMinutes) {
        const item = { value, expiry: Date.now() + ttlMinutes * 60 * 1000 };
        localStorage.setItem(key, JSON.stringify(item));
    },
    
    getWithExpiry(key) {
        const itemStr = localStorage.getItem(key);
        if (!itemStr) return null;
        try {
            const item = JSON.parse(itemStr);
            if (Date.now() > item.expiry) {
                localStorage.removeItem(key);
                return null;
            }
            return item.value;
        } catch { return null; }
    }
};
console.log('✅ AlaisaiHelpers جاهز');
</script>

<!-- ========== 3. منسقات البيانات المتقدمة (Formatters) ========== -->
<script>
/**
 * Alaisai Formatters - أدوات تنسيق البيانات المتقدمة
 * @version 2.0.0
 */
const AlaisaiFormatters = {
    version: '2.0.0',
    
    currency(amount, currency = 'SAR') {
        try {
            return new Intl.NumberFormat('ar-SA', { style: 'currency', currency }).format(amount);
        } catch {
            return `${amount} ${currency}`;
        }
    },
    
    number(number, options = {}) {
        const { decimals = 2 } = options;
        try {
            return new Intl.NumberFormat('ar-SA', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(number);
        } catch {
            return number.toString();
        }
    },
    
    date(date, options = {}) {
        const { format = 'short' } = options;
        const d = new Date(date);
        try {
            if (format === 'short') return d.toLocaleDateString('ar-SA');
            if (format === 'long') return d.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            if (format === 'time') return d.toLocaleTimeString('ar-SA');
            if (format === 'relative') return this.relativeTime(date);
        } catch {}
        return d.toLocaleDateString();
    },
    
    relativeTime(date) {
        const diff = Date.now() - new Date(date);
        const seconds = Math.floor(diff / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        const months = Math.floor(days / 30);
        const years = Math.floor(months / 12);
        
        if (years > 0) return years === 1 ? 'منذ سنة' : `منذ ${years} سنوات`;
        if (months > 0) return months === 1 ? 'منذ شهر' : `منذ ${months} أشهر`;
        if (days > 0) return days === 1 ? 'منذ يوم' : `منذ ${days} أيام`;
        if (hours > 0) return hours === 1 ? 'منذ ساعة' : `منذ ${hours} ساعات`;
        if (minutes > 0) return minutes === 1 ? 'منذ دقيقة' : `منذ ${minutes} دقائق`;
        return 'الآن';
    },
    
    fileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    },
    
    phone(phone) {
        const cleaned = phone.replace(/\D/g, '');
        if (cleaned.length === 10 && cleaned.startsWith('05')) {
            return cleaned.replace(/(05)(\d{2})(\d{3})(\d{3})/, '$1$2 $3 $4');
        } else if (cleaned.length === 12 && cleaned.startsWith('966')) {
            return '+966 ' + cleaned.slice(3).replace(/(\d{2})(\d{3})(\d{3})/, '$1 $2 $3');
        }
        return phone;
    },
    
    maskEmail(email) {
        const [local, domain] = email.split('@');
        if (local.length <= 3) return local[0] + '***@' + domain;
        return local.slice(0, 3) + '*'.repeat(local.length - 3) + '@' + domain;
    },
    
    maskNumber(number, visibleDigits = 4) {
        const str = number.toString();
        return '*'.repeat(Math.max(0, str.length - visibleDigits)) + str.slice(-visibleDigits);
    }
};
console.log('✅ AlaisaiFormatters جاهز');
</script>

<!-- ========== 4. نظام الإضافات المتكامل (Addons Manager) ========== -->
<script>
/**
 * Alaisai Addons Manager - نظام إدارة الإضافات المتكامل
 * @version 3.3.0
 */
const AlaisaiAddons = {
    version: '3.3.0',
    addons: new Map(),
    
    async init() {
        try {
            const stored = localStorage.getItem('alaisai_addons');
            if (stored) {
                const parsed = JSON.parse(stored);
                parsed.forEach(addon => this.addons.set(addon.id, addon));
            }
        } catch (err) {
            console.warn('⚠️ Could not load addons:', err);
        }
        console.log('📦 AlaisaiAddons جاهز');
        return this;
    },
    
    async addAddon(addonData) {
        const id = addonData.id || 'addon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        const addon = {
            id,
            name: addonData.name || 'إضافة جديدة',
            version: addonData.version || '1.0.0',
            description: addonData.description || '',
            author: addonData.author || 'غير معروف',
            icon: addonData.icon || '📦',
            content: addonData.content || '',
            enabled: addonData.enabled !== false,
            installedAt: new Date().toISOString()
        };
        
        this.addons.set(id, addon);
        this._save();
        return addon;
    },
    
    async removeAddon(id) {
        const result = this.addons.delete(id);
        if (result) this._save();
        return result;
    },
    
    listAddons() {
        return Array.from(this.addons.values());
    },
    
    getAddon(id) {
        return this.addons.get(id);
    },
    
    _save() {
        localStorage.setItem('alaisai_addons', JSON.stringify(Array.from(this.addons.values())));
    }
};
AlaisaiAddons.init();
</script>

<!-- ========== 5. نظام قاعدة البيانات (Database) ========== -->
<script>
/**
 * Alaisai Database - نظام إدارة قواعد البيانات
 * @version 2.0.0
 */
const AlaisaiDB = {
    version: '2.0.0',
    db: null,
    
    async init() {
        return new Promise((resolve) => {
            const request = indexedDB.open('AlaisaiDB', 1);
            request.onerror = () => resolve(null);
            request.onsuccess = (event) => {
                this.db = event.target.result;
                console.log('🗄️ AlaisaiDB جاهز');
                resolve(this);
            };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('settings')) {
                    db.createObjectStore('settings', { keyPath: 'key' });
                }
                if (!db.objectStoreNames.contains('addons')) {
                    db.createObjectStore('addons', { keyPath: 'id' });
                }
            };
        });
    },
    
    async put(storeName, data) {
        if (!this.db) await this.init();
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            const request = store.put(data);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    },
    
    async get(storeName, key) {
        if (!this.db) await this.init();
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(storeName, 'readonly');
            const store = tx.objectStore(storeName);
            const request = store.get(key);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    },
    
    async getAll(storeName) {
        if (!this.db) await this.init();
        return new Promise((resolve, reject) => {
            const tx = this.db.transaction(storeName, 'readonly');
            const store = tx.objectStore(storeName);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }
};
AlaisaiDB.init();
</script>

<!-- ========== 6. نظام API المتكامل ========== -->
<script>
/**
 * Alaisai API - واجهة برمجة التطبيقات المركزية
 * @version 2.0.0
 */
const AlaisaiAPI = {
    version: '2.0.0',
    endpoints: new Map(),
    
    register(endpoint, handler, options = {}) {
        this.endpoints.set(endpoint, { handler, options, hits: 0 });
        return this;
    },
    
    async call(endpoint, data = {}) {
        const api = this.endpoints.get(endpoint);
        if (!api) return { success: false, error: 'ENDPOINT_NOT_FOUND' };
        
        try {
            api.hits++;
            const result = await api.handler(data);
            return { success: true, data: result };
        } catch (error) {
            return { success: false, error: error.message };
        }
    }
};

AlaisaiAPI.register('system.info', () => ({
    version: '3.0.0',
    time: new Date().toISOString()
}));
console.log('🔌 AlaisaiAPI جاهز');
</script>
