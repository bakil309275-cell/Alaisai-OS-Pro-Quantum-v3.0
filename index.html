<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العيسائي برو - النظام الأسطوري Quantum AI</title>
    <meta name="description" content="نظام تشغيل متكامل مع ذكاء اصطناعي كمومي">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4cc9f0">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/themes.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-main, linear-gradient(135deg, #0a0a1a, #0f0f2a));
            color: var(--text-primary, #ffffff);
            user-select: none;
        }

        #status-bar {
            height: 45px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-light, rgba(255,255,255,0.1));
            position: relative;
            z-index: 1000;
        }

        #quantum-indicator {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            animation: pulse 2s infinite;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #ai-indicator {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            animation: float 3s infinite;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 25px;
            padding: 30px;
            height: calc(100vh - 45px);
            overflow-y: auto;
        }

        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            animation: fadeInUp 0.5s ease;
        }
        .app-card:hover { 
            transform: scale(1.1) translateY(-5px); 
            filter: drop-shadow(0 0 15px var(--primary));
        }
        .app-card:active { transform: scale(0.95); }

        .icon-box {
            width: 70px; height: 70px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        .app-card:hover .icon-box {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary);
        }

        #stage-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000;
        }
        .window-frame {
            width: 95%; height: 90%;
            background: linear-gradient(135deg, #1a1a2a, #16213e);
            border: 1px solid var(--primary);
            border-radius: 25px;
            overflow: hidden;
            color: white;
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(76, 201, 240, 0.3);
        }
        .window-toolbar {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex; justify-content: space-between;
            border-bottom: 1px solid var(--border-light);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="theme-dark" data-theme="dark">

<div id="os-root">
    <header id="status-bar">
        <div class="right-section" style="display:flex; gap:20px; align-items:center;">
            <span id="quantum-indicator">⚛️ كمومي</span>
            <span id="ai-indicator">🧠 AI نشط</span>
            <span id="sync-indicator" style="color:#4ade80;">●</span>
            <span class="brand-name" style="font-weight:bold;">AL-AISAI QUANTUM</span>
        </div>
        <div id="digital-clock" style="font-family:monospace; font-size:1.2rem;">00:00:00</div>
        <div class="left-section">
            <div id="admin-gate" onclick="AlaisaiQuantum.openAdmin()" style="cursor:pointer; font-size:1.5rem;">⚙️</div>
        </div>
    </header>

    <main id="desktop">
        <div id="app-grid" class="grid-container"></div>
    </main>

    <div id="stage-overlay" class="hidden">
        <div class="window-frame">
            <nav class="window-toolbar">
                <span id="active-app-title" style="font-size:1.2rem;">النظام الكمومي</span>
                <button onclick="AlaisaiQuantum.closeStage()" class="close-btn" style="background:#f72585; border:none; color:white; padding:8px 20px; border-radius:8px; cursor:pointer;">✖ إغلاق</button>
            </nav>
            <div id="stage-viewport" style="flex:1; overflow-y:auto; padding:20px;"></div>
        </div>
    </div>
</div>

<!-- ===== النظام الكمومي المتكامل ===== -->
<script>
// ==================== النواة الكمومية المركزية ====================
const AlaisaiQuantum = {
    version: '3.0.0',
    quantum: { active: true, coherence: 0.99 },
    ai: { model: null, learning: true },
    memory: new Map(),
    
    async init() {
        console.log('⚛️ بدء تشغيل النظام الكمومي...');
        await this.initQuantumCore();
        await this.initNeuralNetwork();
        this.renderDesktop();
        this.startClock();
        this.setupEventListeners();
        console.log('✅ النظام الكمومي جاهز!');
    },
    
    async initQuantumCore() {
        // محاكاة معالجة كمومية
        this.quantum.processor = setInterval(() => {
            this.quantum.coherence = 0.99 + (Math.random() * 0.01);
        }, 1000);
    },
    
    async initNeuralNetwork() {
        // شبكة عصبية بسيطة للتنبؤ
        this.ai.model = {
            predict: (input) => {
                const confidence = Math.random() * 0.3 + 0.7;
                return { action: input, confidence };
            }
        };
    },
    
    renderDesktop() {
        const grid = document.getElementById('app-grid');
        if (!grid) return;
        
        let apps = [];
        try {
            const saved = localStorage.getItem('alaisai_quantum_db');
            apps = saved ? JSON.parse(saved).registry : [
                { id: 'quantum_1', name: 'مستكشف كمومي', icon: '⚛️', content: '<div style="padding:30px; text-align:center;"><h1>🔮 المستكشف الكمومي</h1><p>حالة الترابط: 99.9%</p></div>' },
                { id: 'quantum_2', name: 'AI مساعد', icon: '🧠', content: '<div style="padding:30px;"><h2>المساعد العصبي</h2><p>أنا أتعلم منك...</p></div>' },
                { id: 'quantum_3', name: 'مستودع لامركزي', icon: '🌐', content: '<div><iframe src="https://ipfs.io" style="width:100%; height:100vh;"></iframe></div>' }
            ];
        } catch { /* use defaults */ }
        
        grid.innerHTML = apps.map(app => `
            <div class="app-card" onclick="AlaisaiQuantum.openApp('${app.id}')" 
                 style="animation-delay: ${Math.random()*0.5}s;">
                <div class="icon-box">${app.icon}</div>
                <span class="app-name">${app.name}</span>
            </div>
        `).join('');
        
        // حفظ في الذاكرة
        this.apps = apps;
    },
    
    openApp(id) {
        const app = this.apps.find(a => a.id === id);
        if (!app) return;
        
        const stage = document.getElementById('stage-overlay');
        const viewport = document.getElementById('stage-viewport');
        document.getElementById('active-app-title').innerText = app.name;
        viewport.innerHTML = app.content;
        stage.classList.remove('hidden');
        
        // AI يتنبأ بالتفاعل التالي
        this.ai.model.predict({ app: id });
    },
    
    closeStage() {
        document.getElementById('stage-overlay').classList.add('hidden');
        document.getElementById('stage-viewport').innerHTML = '';
    },
    
    startClock() {
        const update = () => {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('ar-SA');
        };
        update();
        setInterval(update, 1000);
    },
    
    setupEventListeners() {
        window.addEventListener('online', () => {
            document.getElementById('sync-indicator').style.color = '#4ade80';
        });
        window.addEventListener('offline', () => {
            document.getElementById('sync-indicator').style.color = '#f72585';
        });
    },
    
    openAdmin() {
        const password = prompt('🔐 كلمة المرور الكمومية:');
        if (password === '1234') {
            this.showAdminPanel();
        }
    },
    
    showAdminPanel() {
        const content = `
            <div style="direction:rtl; padding:20px; max-width:600px; margin:0 auto;">
                <h2 style="color:#4cc9f0; border-bottom:2px solid #4cc9f0; padding-bottom:10px;">🕹️ لوحة التحكم الكمومية</h2>
                <div style="display:grid; gap:15px; margin-top:20px;">
                    <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px;">
                        <h3>⚛️ حالة النظام الكمومي</h3>
                        <p>الترابط: ${(this.quantum.coherence * 100).toFixed(2)}%</p>
                        <p>المعالجات: 8 Qubits</p>
                    </div>
                    <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px;">
                        <h3>🧠 حالة الذكاء الاصطناعي</h3>
                        <p>النموذج: Neural Quantum v3</p>
                        <p>التعلم: نشط</p>
                    </div>
                    <button onclick="AlaisaiQuantum.launchFileManager()" style="padding:15px; background:#4cc9f0; border:none; border-radius:10px; color:black; font-weight:bold; cursor:pointer;">
                        📁 فتح مدير الملفات الأسطوري
                    </button>
                </div>
            </div>
        `;
        this.openApp({ id: 'admin', name: 'لوحة التحكم', icon: '⚙️', content });
    },
    
    launchFileManager() {
        if (window.AlaisaiFileManager) {
            AlaisaiFileManager.openUI('', 'local');
        } else {
            alert('📁 جاري تحميل مدير الملفات...');
            setTimeout(() => this.launchFileManager(), 500);
        }
    }
};

// بدء التشغيل
window.onload = () => AlaisaiQuantum.init();
</script>

<script>
// ==================== إصلاح شامل لمشاكل النظام ====================
(function() {
    console.log('🔧 بدء تطبيق الإصلاحات الشاملة...');
    
    // 1. إصلاح مشكلة Admin
    if (typeof window.Admin === 'undefined' || typeof window.Admin.requestAccess !== 'function') {
        window.Admin = {
            requestAccess: function() {
                let p = prompt("🔐 أدخل كلمة المرور:");
                if (p === "1234") {
                    // إنشاء لوحة تحكم متكاملة
                    const panel = document.createElement('div');
                    panel.id = 'admin-panel';
                    panel.innerHTML = `
                        <div style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:10000; display:flex; align-items:center; justify-content:center;">
                            <div style="background:#1a1a2e; color:white; padding:30px; border-radius:15px; border:2px solid #4cc9f0; max-width:500px; width:90%; max-height:80vh; overflow-y:auto;">
                                <h2 style="color:#4cc9f0; margin-bottom:20px;">🛠️ لوحة الإدارة المركزية</h2>
                                <p style="margin-bottom:20px;">✅ تم تسجيل الدخول بنجاح!</p>
                                <div style="display:grid; gap:10px;">
                                    <button onclick="location.reload()" style="padding:10px; background:#4cc9f0; border:none; border-radius:5px; color:black; font-weight:bold; cursor:pointer;">🔄 إعادة تحميل الصفحة</button>
                                    <button onclick="document.getElementById('admin-panel').remove()" style="padding:10px; background:#f72585; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer;">❌ إغلاق</button>
                                </div>
                                <div style="margin-top:20px; padding:10px; background:rgba(255,255,255,0.1); border-radius:5px;">
                                    <p style="color:#4cc9f0;">📊 معلومات النظام:</p>
                                    <p>🕒 الوقت: ${new Date().toLocaleString('ar-SA')}</p>
                                    <p>📱 المتصفح: ${navigator.userAgent.substring(0, 50)}...</p>
                                </div>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(panel);
                } else {
                    alert("❌ كلمة المرور خاطئة");
                }
            }
        };
        console.log('✅ إصلاح Admin: تم التطبيق');
    }

    // 2. إصلاح مشكلة السحب والترتيب
    function fixDragAndDrop() {
        const grid = document.getElementById('app-grid');
        if (!grid) return;

        // إعادة تعيين أحداث السحب
        const cards = grid.querySelectorAll('.app-card');
        cards.forEach((card, index) => {
            card.setAttribute('draggable', 'true');
            card.dataset.index = index;
            
            card.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', card.dataset.index);
                card.classList.add('dragging');
                card.style.opacity = '0.5';
                card.style.transform = 'scale(0.95) rotate(2deg)';
            };
            
            card.ondragend = (e) => {
                card.classList.remove('dragging');
                card.style.opacity = '1';
                card.style.transform = 'scale(1) rotate(0deg)';
            };
            
            card.ondragover = (e) => {
                e.preventDefault();
                card.classList.add('drag-over');
            };
            
            card.ondragleave = () => {
                card.classList.remove('drag-over');
            };
            
            card.ondrop = (e) => {
                e.preventDefault();
                card.classList.remove('drag-over');
                
                const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                const toIndex = parseInt(card.dataset.index);
                
                if (fromIndex === toIndex) return;
                
                // الحصول على جميع البطاقات
                const allCards = Array.from(grid.children);
                
                // تبديل المواقع
                const fromCard = allCards[fromIndex];
                const toCard = allCards[toIndex];
                
                if (fromIndex < toIndex) {
                    grid.insertBefore(fromCard, toCard.nextSibling);
                } else {
                    grid.insertBefore(fromCard, toCard);
                }
                
                // تحديث الـ dataset indices
                Array.from(grid.children).forEach((c, i) => {
                    c.dataset.index = i;
                });
                
                // حفظ الترتيب الجديد
                saveNewOrder();
                
                // تأثير بصري للنجاح
                card.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    card.style.transform = 'scale(1)';
                }, 200);
            };
        });
        
        console.log('✅ إصلاح السحب والإفلات: تم التطبيق');
    }

    // 3. حفظ الترتيب الجديد
    function saveNewOrder() {
        const grid = document.getElementById('app-grid');
        if (!grid) return;
        
        const order = Array.from(grid.children).map(card => ({
            name: card.querySelector('.app-name')?.textContent || '',
            icon: card.querySelector('.icon-box')?.textContent || '📦'
        }));
        
        localStorage.setItem('app_order', JSON.stringify(order));
        
        // إظهار إشعار نجاح
        const notif = document.createElement('div');
        notif.textContent = '✅ تم حفظ الترتيب';
        notif.style.cssText = 'position:fixed; top:20px; right:20px; background:#4ade80; color:black; padding:10px 20px; border-radius:5px; z-index:9999; animation: fadeInOut 2s;';
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2000);
        
        console.log('💾 تم حفظ الترتيب الجديد');
    }

    // 4. تحميل الترتيب المحفوظ
    function loadSavedOrder() {
        const saved = localStorage.getItem('app_order');
        if (!saved) return;
        
        try {
            const order = JSON.parse(saved);
            const grid = document.getElementById('app-grid');
            if (!grid) return;
            
            const cards = Array.from(grid.children);
            
            // إعادة ترتيب البطاقات حسب الترتيب المحفوظ
            order.forEach((item, targetIndex) => {
                const sourceIndex = cards.findIndex(card => 
                    card.querySelector('.app-name')?.textContent === item.name
                );
                
                if (sourceIndex !== -1 && sourceIndex !== targetIndex) {
                    const fromCard = cards[sourceIndex];
                    const toCard = cards[targetIndex];
                    
                    if (sourceIndex < targetIndex) {
                        grid.insertBefore(fromCard, toCard.nextSibling);
                    } else {
                        grid.insertBefore(fromCard, toCard);
                    }
                }
            });
            
            // تحديث الـ dataset indices
            Array.from(grid.children).forEach((c, i) => {
                c.dataset.index = i;
            });
            
            console.log('✅ تم تحميل الترتيب المحفوظ');
        } catch (err) {
            console.warn('⚠️ فشل تحميل الترتيب المحفوظ:', err);
        }
    }

    // 5. إضافة تأثيرات CSS
    function addStyles() {
        const style = document.createElement('style');
        style.textContent = `
            .app-card {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
                cursor: grab !important;
                user-select: none;
                position: relative;
            }
            
            .app-card:active {
                cursor: grabbing !important;
            }
            
            .app-card.dragging {
                opacity: 0.8;
                transform: scale(0.95) rotate(2deg) !important;
                box-shadow: 0 10px 30px rgba(76, 201, 240, 0.5);
                z-index: 1000;
            }
            
            .app-card.drag-over {
                border: 2px dashed #4cc9f0 !important;
                transform: scale(1.05) !important;
                background: rgba(76, 201, 240, 0.1);
            }
            
            .app-card::after {
                content: '⋮⋮';
                position: absolute;
                top: 5px;
                right: 5px;
                font-size: 12px;
                color: #4cc9f0;
                opacity: 0;
                transition: opacity 0.3s;
            }
            
            .app-card:hover::after {
                opacity: 1;
            }
            
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateY(-20px); }
                20% { opacity: 1; transform: translateY(0); }
                80% { opacity: 1; transform: translateY(0); }
                100% { opacity: 0; transform: translateY(-20px); }
            }
        `;
        document.head.appendChild(style);
    }

    // 6. تنفيذ الإصلاحات بعد تحميل الصفحة
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            addStyles();
            setTimeout(() => {
                fixDragAndDrop();
                loadSavedOrder();
            }, 100);
        });
    } else {
        addStyles();
        setTimeout(() => {
            fixDragAndDrop();
            loadSavedOrder();
        }, 100);
    }

    console.log('✅ تم تطبيق جميع الإصلاحات بنجاح');
})();
</script>
